<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typography Environment Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        body {
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: #252525;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .title {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(45deg, #f0f0f0, #808080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .gradient-display {
            height: 300px;
            border-radius: 8px;
            margin: 2rem 0;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #4a90e2, #87ceeb);
            transition: background 0.5s ease;
        }

        .typography-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-size: 1.2rem;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: #404040;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4a90e2;
            cursor: pointer;
        }

        .label {
            font-size: 0.9rem;
            color: #b0b0b0;
        }

        .value-display {
            font-size: 1.8rem;
            text-align: center;
            margin-top: 1rem;
        }

        .type-sample {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }

        .type-sample p {
            margin: 0.5rem 0;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            .controls {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Typography Environment Monitor</h1>
        
        <div class="gradient-display" id="gradientDisplay">
            <div class="typography-overlay">
                <div id="conditions"></div>
                <div id="typeStatus"></div>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label class="label">Temperature (°C)</label>
                <input type="range" id="tempSlider" min="15" max="35" value="22" step="0.1">
            </div>
            <div class="control-group">
                <label class="label">Humidity (%)</label>
                <input type="range" id="humiditySlider" min="30" max="80" value="50" step="0.1">
            </div>
        </div>

        <div class="value-display">
            <div id="values"></div>
        </div>

        <div class="type-sample">
            <p id="typeSample">The quick brown fox jumps over the lazy dog</p>
        </div>
    </div>

    <script>
        const tempSlider = document.getElementById('tempSlider');
        const humiditySlider = document.getElementById('humiditySlider');
        const gradientDisplay = document.getElementById('gradientDisplay');
        const conditions = document.getElementById('conditions');
        const values = document.getElementById('values');
        const typeStatus = document.getElementById('typeStatus');
        const typeSample = document.getElementById('typeSample');

        function updateDisplay() {
            const temp = parseFloat(tempSlider.value);
            const humidity = parseFloat(humiditySlider.value);

            // Update values display
            values.textContent = `${temp.toFixed(1)}°C | ${humidity.toFixed(1)}%`;

            // Calculate gradient colors based on conditions
            const hue1 = Math.min(240, Math.max(180, 240 - (temp - 15) * 4));
            const hue2 = Math.min(200, Math.max(140, 200 - (humidity - 30) * 0.5));
            
            gradientDisplay.style.background = `linear-gradient(135deg, 
                hsl(${hue1}, 70%, 60%), 
                hsl(${hue2}, 60%, 70%))`;

            // Determine conditions status
            let status = '';
            if (temp < 18) status = 'Too Cold';
            else if (temp > 30) status = 'Too Hot';
            else if (humidity < 35) status = 'Too Dry';
            else if (humidity > 70) status = 'Too Humid';
            else status = 'Optimal Conditions';

            conditions.textContent = status;
            
            // Update typography sample based on conditions
            if (status === 'Optimal Conditions') {
                typeSample.style.opacity = '1';
                typeStatus.textContent = 'Typography Preservation: Excellent';
            } else {
                typeSample.style.opacity = '0.7';
                typeStatus.textContent = 'Typography Preservation: At Risk';
            }
        }

        tempSlider.addEventListener('input', updateDisplay);
        humiditySlider.addEventListener('input', updateDisplay);

        // Initial update
        updateDisplay();
    </script>
</body>
</html>
