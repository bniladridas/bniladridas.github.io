    <style>
        .chat-ad {
            margin-top: 30px;
            background: linear-gradient(135deg, #007bff, #6a11cb);
            color: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .chat-ad h3 {
            margin-bottom: 20px;
            font-size: 2.5rem;
            font-weight: 700;
        }
        .chat-ad p {
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
        .chat-ad .btn {
            background-color: #fff;
            color: #007bff;
            border: 2px solid #fff;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
        }
        .chat-ad .btn:hover {
            background-color: #007bff;
            color: #fff;
            border: 2px solid #fff;
        }
        .chat-ad .fas {
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        .chat-ad::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            z-index: 0;
            animation: rotate 20s infinite linear;
        }
        .chat-ad::after {
            content: '';
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            z-index: 0;
            animation: rotate 20s infinite linear;
            animation-delay: -10s;
        }
        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
