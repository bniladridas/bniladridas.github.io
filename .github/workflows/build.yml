# Build → verify → deploy to GitHub Pages.
#
# On push to main: build, verify, upload artifact, deploy to Pages.
# On pull requests: build and verify only (no upload, no deploy).

name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Serialise deployments so Pages never receives overlapping uploads.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build
        run: python3 scripts/build.py
      - name: Verify generated files are up to date
        run: |
          git diff --exit-code -- agents.js search-index.json rss.xml sitemap.xml \
            && echo "Generated files are up to date." \
            || { echo "ERROR: Generated files are stale. Run 'python3 scripts/build.py' and commit the changes."; exit 1; }
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
