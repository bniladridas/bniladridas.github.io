name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build
        run: python3 build.py
      - name: Verify generated files are up to date
        run: |
          git diff --exit-code -- agents.js search-index.json rss.xml sitemap.xml \
            && echo "Generated files are up to date." \
            || { echo "ERROR: Generated files are stale. Run 'python3 build.py' and commit the changes."; exit 1; }
